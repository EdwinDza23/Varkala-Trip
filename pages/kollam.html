<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kollam - Kerala Road Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body { padding-top: 80px; background: var(--bg); }
    .place-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .place-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .place-img { width: 100%; height: 350px; object-fit: cover; border-bottom: 1px solid var(--border); }
    .place-content { padding: 30px; }
    .place-title { font-family: 'Playfair Display', serif; font-size: 40px; color: #fff; margin-bottom: 15px; }
    .place-desc { font-size: 16px; color: var(--text); margin-bottom: 30px; line-height: 1.6; opacity: 0.9; }
    .place-section { margin-bottom: 25px; }
    .place-section h3 { color: var(--teal); font-size: 18px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .place-section ul { list-style-type: none; padding: 0; }
    .place-section li { margin-bottom: 8px; color: var(--muted); position: relative; padding-left: 18px; }
    .place-section li::before { content: ''; color: var(--orange); position: absolute; left: 0; }
    .back-btn { display: inline-block; padding: 10px 20px; background: var(--teal-dim); color: var(--teal); text-decoration: none; border-radius: 8px; font-weight: 500; border: 1px solid rgba(45, 212, 160, 0.2); transition: all 0.2s; }
    .back-btn:hover { background: rgba(45, 212, 160, 0.2); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="place-container">
    <div class="place-card">
      <img src="../images/kollam.jpg" alt="Kollam" class="place-img">
      <div class="place-content">
        <h1 class="place-title">Kollam</h1>
        <p class="place-desc">The gateway to Kerala backwaters and scenic sunset spots.</p>
        
        <div class="place-section">
          <h3>Things to Do</h3>
          <ul>
            <li>Kappil Beach Road</li><li>Ashtamudi Lake</li><li>Boating</li>
          </ul>
        </div>
        
        <div class="place-section">
          <h3>Stay Options</h3>
          <ul>
            <li>Backwater Resorts</li><li>Budget Stays</li>
          </ul>
        </div>
        
        <a href="../index.html" class="back-btn"> Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
